<!DOCTYPE html>
<html>
<head>
  <title>FocusInbox 🎓</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<header>
  <h1>FocusInbox 🎓</h1>
  <div>
    <button id="loginBtn" onclick="loginUser()">Login</button>
    <button onclick="fetchEmails()">Fetch Emails</button>
    <button onclick="logoutUser()">Logout</button>
  </div>
</header>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <button onclick="startFocus()">Start Focus</button>
    <button onclick="goToSettings()">⚙️ Settings</button>
  </div>

  <h2>All Messages 📥</h2>
  <ul id="messages"></ul>
</div>

<!-- FOCUS SCREEN -->
<div id="focusScreen" class="hidden">
  <h2>🧘 Focus Mode</h2>
  <p id="timer">Time: 25:00</p>

  <div class="container">
    <div class="box">
      <h3>🚨 Allowed</h3>
      <ul id="allowed"></ul>
    </div>

    <div class="box">
      <h3>⏳ Queued</h3>
      <ul id="queue"></ul>
    </div>

    <div class="box">
      <h3>❌ Blocked</h3>
      <ul id="blocked"></ul>
    </div>
  </div>

  <button onclick="endFocus()">End Session</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
  <h2>⚙️ Settings</h2>

  <label>Focus Time (minutes)</label>
  <input type="number" id="focusTimeInput" value="25">

  <br><br>
  <button onclick="saveSettings()">Save</button>
  <button onclick="goToDashboard()">Back</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
