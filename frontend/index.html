<!DOCTYPE html>
<html>
<head>
  <title>FocusInbox 🚀</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<h1>FocusInbox 🚀</h1>

<button id="login-btn" onclick="login()">Login with Google</button>
<button onclick="fetchEmails()">Fetch Emails</button>
<button onclick="startFocus()">Start Focus</button>

<div class="container">

  <div class="box">
    <h2>✅ Allowed</h2>
    <ul id="messages"></ul>
  </div>

  <div class="box">
    <h2>⏳ Queued</h2>
    <ul id="queue"></ul>
  </div>

  <div class="box">
    <h2>❌ Blocked</h2>
    <ul id="blocked"></ul>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
